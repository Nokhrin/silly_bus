name: Render Diagrams

on:
  push:
    branches:
      - 'main'
    paths:
      - 'oopJava/assignments/lambda-parser/docs/**/*.xml'
  workflow_dispatch:

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create output directory
        run: mkdir -p oopJava/assignments/lambda-parser/docs/generated

      - name: Render diagrams with Docker
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/data \
            rlespinasse/drawio-export \
            --output /data/oopJava/assignments/lambda-parser/docs/generated \
            --input /data/oopJava/assignments/lambda-parser/docs \
            --format png \
            --format svg \
            --crop

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: diagrams
          path: oopJava/assignments/lambda-parser/docs/generated/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4